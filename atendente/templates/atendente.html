<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Atendente - SENAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/css/atendente.css">
    <style>
        /* Definindo a cor padrão do SENAI caso não esteja no CSS externo */
        .bg-senai { background-color: #005ca9; }
        .border-senai { border-color: #005ca9; }
        .text-senai { color: #005ca9; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <nav class="bg-senai p-6 text-white shadow-lg mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black italic">SENAI <span class="font-light not-italic text-xl ml-2">Controle de Atendimento</span></h1>
            <div id="status-conexao" class="flex items-center gap-2 text-sm bg-white/20 px-4 py-2 rounded-full">
                <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
                Sistema Online
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 max-w-4xl">
        <div class="bg-white rounded-[2rem] shadow-2xl p-10 text-center border-t-8 border-senai mb-8">
            
            <div class="mb-8 max-w-xs mx-auto">
                <label class="block text-gray-400 font-bold uppercase tracking-widest text-xs mb-2">Seu Local de Atendimento</label>
                <select id="select-guiche" class="w-full p-3 rounded-xl border-2 border-gray-100 font-bold text-senai focus:border-senai outline-none bg-gray-50">
                    <option value="Guichê 01">Guichê 01</option>
                    <option value="Guichê 02">Guichê 02</option>
                    <option value="Guichê 03">Guichê 03</option>
                    <option value="Mesa A">Mesa A</option>
                    <option value="Mesa B">Mesa B</option>
                </select>
            </div>

            <h2 class="text-gray-400 font-bold uppercase tracking-widest mb-4">Em Atendimento Agora</h2>
            
            <div id="display-atendimento" class="mb-8">
                <div id="atendente-codigo" class="text-8xl font-black text-gray-800 leading-none mb-2">---</div>
                <div id="atendente-nome" class="text-3xl font-bold text-senai uppercase italic">Aguardando Chamada</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="chamarProximo()" class="group bg-senai hover:bg-blue-800 text-white p-8 rounded-2xl transition-all shadow-xl flex flex-col items-center justify-center gap-2">
                    <i data-lucide="user-plus" class="w-10 h-10 group-hover:scale-110 transition"></i>
                    <span class="text-xl font-black">CHAMAR PRÓXIMO</span>
                </button>

                <button onclick="chamarNovamente(event)" class="group bg-gray-200 hover:bg-gray-300 text-gray-700 p-8 rounded-2xl transition-all flex flex-col items-center justify-center gap-2">
                    <i data-lucide="refresh-cw" class="w-10 h-10 group-hover:rotate-180 transition-transform duration-500"></i>
                    <span class="text-xl font-black">REPETIR CHAMADA</span>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-lg p-6 border-b-4 border-gray-200">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-600 flex items-center gap-2">
                    <i data-lucide="list-ordered"></i> Fila de Espera
                </h3>
                <span id="contador-fila" class="bg-gray-100 text-gray-600 px-4 py-1 rounded-full font-bold">0 pessoas</span>
            </div>
            
            <div id="lista-espera" class="space-y-3">
                <p class="text-center text-gray-400 py-4">Carregando fila...</p>
            </div>
        </div>
    </main>

    <script src="/static/js/atendente.js"></script>
</body>
</html>
