<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Atendente - SENAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --senai-blue: #005ca9; }
        .text-senai { color: var(--senai-blue); }
        .bg-senai { background-color: var(--senai-blue); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <!-- Header Atendente -->
    <header class="bg-white shadow-sm border-b-4 border-senai p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="text-senai text-3xl font-black italic">SENAI</h1>
                <div class="h-8 w-[2px] bg-gray-200"></div>
                <h2 class="text-gray-600 font-bold uppercase tracking-wider">Painel de Atendimento</h2>
            </div>
            <div id="status-badge" class="flex items-center gap-2 text-green-600 font-bold">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                Sincronizado
            </div>
        </div>
    </header>

    <main class="container mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Coluna da Esquerda: Ações -->
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
                <h3 class="text-xl font-bold text-gray-700 mb-6">Controle do Guichê</h3>
                
                <button onclick="chamarProximo()" 
                    class="w-full bg-senai hover:bg-blue-800 text-white py-6 rounded-xl font-black text-2xl shadow-lg shadow-blue-200 transition-all active:scale-95 flex flex-col items-center gap-2">
                    <i data-lucide="megaphone" class="w-8 h-8"></i>
                    CHAMAR PRÓXIMO
                </button>

                <div class="mt-8 p-4 bg-blue-50 rounded-lg">
                    <p class="text-sm text-blue-800 font-medium">Dica: Ao chamar o próximo, a senha será removida da lista de espera e aparecerá no painel da TV.</p>
                </div>
            </div>
        </div>

        <!-- Coluna da Direita: Lista de Espera -->
        <div class="lg:col-span-2">
            <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <h3 class="text-xl font-bold text-gray-700">Fila de Espera</h3>
                    <span id="total-fila" class="bg-senai text-white px-4 py-1 rounded-full text-sm font-bold">0 pessoas</span>
                </div>

                <div class="overflow-y-auto max-h-[600px]">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50 text-gray-400 text-sm uppercase">
                            <tr>
                                <th class="p-4 font-semibold">Senha</th>
                                <th class="p-4 font-semibold">Cliente</th>
                                <th class="p-4 font-semibold">Serviço</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-fila" class="divide-y divide-gray-100">
                            <!-- Inserido via JS -->
                        </tbody>
                    </table>
                    
                    <!-- Estado Vazio -->
                    <div id="fila-vazia" class="hidden p-20 text-center text-gray-400">
                        <i data-lucide="users" class="w-16 h-16 mx-auto mb-4 opacity-20"></i>
                        <p class="text-lg">Nenhum cliente na fila no momento.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const API_URL = 'http://127.0.0.1:8000';

        // Atualiza a lista a cada 3 segundos
        async function atualizarFila() {
            try {
                const res = await fetch(`${API_URL}/listar-fila`);
                const fila = await res.json();
                
                const tabela = document.getElementById('tabela-fila');
                const emptyState = document.getElementById('fila-vazia');
                const totalFila = document.getElementById('total-fila');
                
                totalFila.textContent = `${fila.length} pessoas`;
                tabela.innerHTML = '';

                if (fila.length === 0) {
                    emptyState.classList.remove('hidden');
                } else {
                    emptyState.classList.add('hidden');
                    fila.forEach(item => {
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-gray-50 transition-colors";
                        tr.innerHTML = `
                            <td class="p-4 font-mono font-bold text-senai text-xl">${item.codigo}</td>
                            <td class="p-4 font-semibold text-gray-700 uppercase">${item.nome}</td>
                            <td class="p-4">
                                <span class="px-3 py-1 rounded-full text-xs font-bold ${item.tipo === 'PRIORITARIO' ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600'}">
                                    ${item.tipo}
                                </span>
                            </td>
                        `;
                        tabela.appendChild(tr);
                    });
                }
            } catch (err) {
                console.error("Erro ao buscar fila", err);
            }
        }

        async function chamarProximo() {
            try {
                const res = await fetch(`${API_URL}/chamar-proxima`, { method: 'POST' });
                
                if (res.status === 404) {
                    alert("A fila está vazia!");
                    return;
                }

                const proximo = await res.json();
                
                // Feedback visual de sucesso
                alert(`CHAMANDO: ${proximo.codigo} - ${proximo.nome}`);
                
                // Atualiza a lista imediatamente
                atualizarFila();
            } catch (err) {
                alert("Erro ao chamar próximo cliente.");
            }
        }

        // Pooling para manter a tela atualizada
        setInterval(atualizarFila, 3000);
        atualizarFila();
    </script>
</body>
</html>
