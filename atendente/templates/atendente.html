Set-Content -Path "atendente/templates/atendente.html" -Value '<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Atendente - SENAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --senai-blue: #005ca9; }
        .bg-senai { background-color: var(--senai-blue); }
        .border-senai { border-color: var(--senai-blue); }
        .text-senai { color: var(--senai-blue); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <nav class="bg-senai p-6 text-white shadow-lg mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black italic">SENAI <span class="font-light not-italic text-xl ml-2">Controle de Atendimento</span></h1>
            <div id="status-conexao" class="flex items-center gap-2 text-sm bg-white/20 px-4 py-2 rounded-full">
                <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
                Sistema Online
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 max-w-4xl">
        <div class="bg-white rounded-[2rem] shadow-2xl p-10 text-center border-t-8 border-senai mb-8">
            
            <div class="mb-8 max-w-xs mx-auto">
                <label class="block text-gray-400 font-bold uppercase tracking-widest text-xs mb-2">Seu Local de Atendimento</label>
                <select id="select-guiche" class="w-full p-3 rounded-xl border-2 border-gray-100 font-bold text-senai focus:border-senai outline-none bg-gray-50">
                    <option value="Guichê 01">Guichê 01</option>
                    <option value="Guichê 02">Guichê 02</option>
                    <option value="Guichê 03">Guichê 03</option>
                    <option value="Mesa A">Mesa A</option>
                    <option value="Mesa B">Mesa B</option>
                </select>
            </div>

            <h2 class="text-gray-400 font-bold uppercase tracking-widest mb-4">Em Atendimento Agora</h2>
            
            <div id="display-atendimento" class="mb-8">
                <div id="atendente-codigo" class="text-8xl font-black text-gray-800 leading-none mb-2">---</div>
                <div id="atendente-nome" class="text-3xl font-bold text-senai uppercase italic">Aguardando Chamada</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="chamarProximo()" class="group bg-senai hover:bg-blue-800 text-white p-8 rounded-2xl transition-all shadow-xl flex flex-col items-center justify-center gap-2">
                    <i data-lucide="user-plus" class="w-10 h-10 group-hover:scale-110 transition"></i>
                    <span class="text-xl font-black">CHAMAR PRÓXIMO</span>
                </button>

                <button onclick="chamarNovamente()" class="group bg-gray-200 hover:bg-gray-300 text-gray-700 p-8 rounded-2xl transition-all flex flex-col items-center justify-center gap-2">
                    <i data-lucide="refresh-cw" class="w-10 h-10 group-hover:rotate-180 transition-transform duration-500"></i>
                    <span class="text-xl font-black">REPETIR CHAMADA</span>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-lg p-6 border-b-4 border-gray-200">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-600 flex items-center gap-2">
                    <i data-lucide="list-ordered"></i> Fila de Espera
                </h3>
                <span id="contador-fila" class="bg-gray-100 text-gray-600 px-4 py-1 rounded-full font-bold">0 pessoas</span>
            </div>
            
            <div id="lista-espera" class="space-y-3">
                <p class="text-center text-gray-400 py-4">Carregando fila...</p>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let atendimentoAtual = null;

        async function chamarProximo() {
            const guicheSelecionado = document.getElementById("select-guiche").value;
            
            try {
                const response = await fetch("/chamar-proxima", { 
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ guiche: guicheSelecionado })
                });

                if (response.ok) {
                    atendimentoAtual = await response.json();
                    document.getElementById("atendente-codigo").textContent = atendimentoAtual.codigo;
                    document.getElementById("atendente-nome").textContent = atendimentoAtual.nome;
                    atualizarFila();
                } else {
                    const erroData = await response.json();
                    alert("Atenção: " + (erroData.detail || "Fila vazia ou erro no servidor"));
                }
            } catch (error) {
                console.error("Erro na requisição:", error);
                alert("Erro ao conectar com o servidor.");
            }
        }

        async function chamarNovamente() {
            if (!atendimentoAtual) return alert("Nenhuma senha foi chamada ainda.");
            // Aqui você pode implementar um novo endpoint ou apenas um alerta visual
            alert(`Repetindo chamada: ${atendimentoAtual.codigo} no ${atendimentoAtual.guiche}`);
        }

        async function atualizarFila() {
            try {
                // Rota que você usa no main.py para pegar quem ainda não foi chamado
                // Se preferir, crie uma rota /fila-espera no backend para listar apenas status "Aguardando"
                const response = await fetch("/listar-fila");
                const fila = await response.json();
                
                const lista = document.getElementById("lista-espera");
                const contador = document.getElementById("contador-fila");
                
                contador.textContent = `${fila.length} na fila`;

                if (fila.length === 0) {
                    lista.innerHTML = `<p class="text-center text-gray-400 py-4">Ninguém aguardando.</p>`;
                    return;
                }

                lista.innerHTML = fila.map(item => `
                    <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl border-l-4 ${item.tipo === "Prioritário" ? "border-red-500" : "border-senai"}">
                        <div>
                            <span class="font-black text-lg">${item.codigo}</span>
                            <span class="ml-3 text-gray-600 font-medium">${item.nome}</span>
                        </div>
                        <span class="text-xs font-bold uppercase px-2 py-1 rounded ${item.tipo === "Prioritário" ? "bg-red-100 text-red-600" : "bg-blue-100 text-blue-600"}">
                            ${item.tipo}
                        </span>
                    </div>
                `).join("");
            } catch (error) {
                console.error("Erro ao atualizar fila:", error);
            }
        }

        setInterval(atualizarFila, 5000);
        atualizarFila();
    </script>
</body>
</html>'
