<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Atendimento - SENAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --senai-blue: #005ca9; }
        .bg-senai { background-color: var(--senai-blue); }
        .text-senai { color: var(--senai-blue); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans p-6">

    <div class="max-w-5xl w-full">
        <header class="text-center mb-12">
            <h1 class="text-senai text-6xl font-black italic mb-2">SENAI</h1>
            <p class="text-gray-500 font-bold tracking-[0.2em] uppercase">Portal de Atendimento Unificado</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- ACESSO AO TOTEM -->
            <a href="/totem" class="group bg-white p-10 rounded-[2.5rem] shadow-xl hover:shadow-2xl transition-all border-b-8 border-green-500 flex flex-col items-center text-center">
                <div class="bg-green-100 p-6 rounded-full mb-6 group-hover:scale-110 transition">
                    <i data-lucide="printer" class="w-12 h-12 text-green-600"></i>
                </div>
                <h2 class="text-2xl font-black text-gray-800 mb-2">TOTEM</h2>
                <p class="text-gray-400 text-sm">Emissão de senhas para alunos e visitantes.</p>
            </a>

            <!-- ACESSO AO PAINEL -->
            <a href="/painel" class="group bg-white p-10 rounded-[2.5rem] shadow-xl hover:shadow-2xl transition-all border-b-8 border-senai flex flex-col items-center text-center">
                <div class="bg-blue-100 p-6 rounded-full mb-6 group-hover:scale-110 transition">
                    <i data-lucide="tv-2" class="w-12 h-12 text-senai"></i>
                </div>
                <h2 class="text-2xl font-black text-gray-800 mb-2">PAINEL</h2>
                <p class="text-gray-400 text-sm">Visualização de chamadas com alerta sonoro.</p>
            </a>

            <!-- ACESSO AO ATENDENTE -->
            <a href="/atendente" class="group bg-white p-10 rounded-[2.5rem] shadow-xl hover:shadow-2xl transition-all border-b-8 border-red-500 flex flex-col items-center text-center">
                <div class="bg-red-100 p-6 rounded-full mb-6 group-hover:scale-110 transition">
                    <i data-lucide="users" class="w-12 h-12 text-red-600"></i>
                </div>
                <h2 class="text-2xl font-black text-gray-800 mb-2">ATENDENTE</h2>
                <p class="text-gray-400 text-sm">Gerenciamento e chamada de fila (Uso Interno).</p>
            </a>

        </div>

        <footer class="mt-16 text-center text-gray-400 text-sm font-medium">
            Desenvolvido para Unidade SENAI Gama
        </footer>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
