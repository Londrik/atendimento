<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Chamadas - SENAI</title>
    <!-- Bibliotecas Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/css/painel.css">
</head>
<body class="bg-gray-200 min-h-screen flex flex-col font-sans">

    <audio id="audioChamada" src="/static/audio/chamada.wav" preload="auto"></audio>

    <header class="bg-white p-6 md:p-8 shadow-xl flex justify-between items-center border-b-8 border-[#005ca9]">
        <div class="flex flex-col">
            <h1 class="text-[#005ca9] text-5xl md:text-7xl font-black italic leading-none">SENAI</h1>
            <p class="text-gray-400 font-bold tracking-[0.2em] md:tracking-[0.3em] uppercase text-sm md:text-xl ml-1">Unidade de Atendimento</p>
        </div>
        <div class="text-right hidden md:block">
            <div id="clock" class="text-5xl md:text-7xl font-black text-gray-800">00:00:00</div>
            <div id="date" class="text-xl md:text-2xl font-bold text-gray-400 uppercase tracking-widest">Aguardando...</div>
        </div>
    </header>

    <main class="flex-grow p-4 md:p-10 grid grid-cols-1 md:grid-cols-12 gap-6 md:gap-10">
        <!-- Lado Esquerdo: Senha Principal -->
        <div class="col-span-1 md:col-span-8 bg-[#005ca9] rounded-[2rem] md:rounded-[3rem] shadow-2xl flex flex-col items-center justify-between py-8 md:py-12 text-white relative overflow-hidden border-4 md:border-8 border-white/20">
            <h2 class="text-2xl md:text-4xl font-black tracking-[0.5em] md:tracking-[1em] opacity-50 uppercase text-center">Senha Atual</h2>
            
            <div class="flex flex-col items-center justify-center flex-grow py-6">
                <div id="current-ticket" class="text-7xl md:text-[14rem] font-black leading-none mb-4">---</div>
                <div id="current-name" class="text-xl md:text-5xl font-bold uppercase tracking-widest bg-white/10 px-6 md:px-12 py-2 md:py-4 rounded-full italic text-center">AGUARDANDO</div>
            </div>
            
            <div class="flex flex-col items-center">
                <span class="text-lg md:text-2xl font-bold uppercase tracking-[0.2em] md:tracking-[0.5em] text-blue-200 mb-2">Dirija-se ao:</span>
                <div id="current-guiche" class="text-5xl md:text-8xl font-black bg-white text-[#005ca9] px-8 md:px-16 py-2 md:py-4 rounded-2xl md:rounded-3xl shadow-inner">---</div>
            </div>
        </div>

        <!-- Lado Direito: Histórico -->
        <div class="col-span-1 md:col-span-4 flex flex-col gap-6">
            <div class="bg-white rounded-[2rem] p-6 md:p-8 shadow-lg flex-grow border-t-8 border-[#005ca9]">
                <h3 class="text-2xl md:text-3xl font-black text-gray-400 mb-6 md:mb-8 uppercase tracking-tighter flex items-center gap-3">
                    <i data-lucide="history" class="w-6 h-6 md:w-8 md:h-8"></i> Últimas Chamadas
                </h3>
                <div id="history-list" class="space-y-4 md:space-y-6">
                    <!-- Senhas anteriores -->
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/painel.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
