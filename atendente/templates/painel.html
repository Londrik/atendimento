<main class="flex-grow p-4 md:p-10 grid grid-cols-1 md:grid-cols-12 gap-6 md:gap-10">
        <!-- Lado Esquerdo: Senha Principal -->
        <!-- No mobile ocupa 1 coluna, no PC ocupa 8 -->
        <div class="col-span-1 md:col-span-8 bg-senai rounded-[2rem] md:rounded-[3rem] shadow-2xl flex flex-col items-center justify-between py-8 md:py-12 text-white relative overflow-hidden border-4 md:border-8 border-white/20">
            
            <h2 class="text-2xl md:text-4xl font-black tracking-[0.5em] md:tracking-[1em] opacity-50 uppercase text-center">Senha Atual</h2>
            
            <!-- Container central responsivo -->
            <div class="flex flex-col items-center justify-center flex-grow py-6">
                <!-- Texto menor no celular e gigante no PC -->
                <div id="current-ticket" class="text-7xl md:text-[14rem] font-black leading-none mb-4">---</div>
                <div id="current-name" class="text-xl md:text-5xl font-bold uppercase tracking-widest bg-white/10 px-6 md:px-12 py-2 md:py-4 rounded-full italic text-center">AGUARDANDO</div>
            </div>
            
            <!-- Rodapé da senha -->
            <div class="flex flex-col items-center">
                <span class="text-lg md:text-2xl font-bold uppercase tracking-[0.2em] md:tracking-[0.5em] text-blue-200 mb-2">Dirija-se ao:</span>
                <div id="current-guiche" class="text-5xl md:text-8xl font-black bg-white text-senai px-8 md:px-16 py-2 md:py-4 rounded-2xl md:rounded-3xl shadow-inner">---</div>
            </div>
        </div>

        <!-- Lado Direito: Histórico -->
        <!-- No mobile fica embaixo da senha -->
        <div class="col-span-1 md:col-span-4 flex flex-col gap-6">
            <div class="bg-white rounded-[2rem] p-6 md:p-8 shadow-lg flex-grow border-t-8 border-senai">
                <h3 class="text-2xl md:text-3xl font-black text-gray-400 mb-6 md:mb-8 uppercase tracking-tighter flex items-center gap-3">
                    <i data-lucide="history" class="w-6 h-6 md:w-8 md:h-8"></i> Últimas Chamadas
                </h3>
                <div id="history-list" class="space-y-4 md:space-y-6">
                    <!-- As senhas anteriores aparecerão aqui -->
                </div>
            </div>
        </div>
    </main>
