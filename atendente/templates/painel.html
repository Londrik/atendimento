<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Chamadas - SENAI</title>
    <!-- Bibliotecas Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Nosso CSS Customizado -->
    <link rel="stylesheet" href="/static/css/painel.css">
</head>
<body class="bg-gray-200 min-h-screen flex flex-col font-sans transition-colors duration-500">

    <audio id="audioChamada" src="/static/audio/chamada.wav" preload="auto"></audio>

    <header class="bg-white p-8 shadow-xl flex justify-between items-center border-b-8 border-senai">
        <div class="flex flex-col">
            <h1 class="text-senai text-7xl font-black italic leading-none">SENAI</h1>
            <p class="text-gray-400 font-bold tracking-[0.3em] uppercase text-xl ml-1">Unidade de Atendimento</p>
        </div>
        <div class="text-right">
            <div id="clock" class="text-7xl font-black text-gray-800">00:00:00</div>
            <div id="date" class="text-2xl font-bold text-gray-400 uppercase tracking-widest">Aguardando...</div>
        </div>
    </header>

    <main class="flex-grow p-10 grid grid-cols-12 gap-10">
        <!-- Lado Esquerdo: Senha Principal -->
        <div class="col-span-8 bg-senai rounded-[3rem] shadow-2xl flex flex-col items-center justify-between py-12 text-white relative overflow-hidden border-8 border-white/20">
            
            <!-- Título com margem controlada em vez de absolute -->
            <h2 class="text-4xl font-black tracking-[1em] opacity-50 uppercase">Senha Atual</h2>
            
            <!-- Container central para evitar sobreposição -->
            <div class="flex flex-col items-center justify-center flex-grow">
                <div id="current-ticket" class="text-[14rem] font-black leading-none mb-4">---</div>
                <div id="current-name" class="text-5xl font-bold uppercase tracking-widest bg-white/10 px-12 py-4 rounded-full italic">AGUARDANDO</div>
            </div>
            
            <!-- Rodapé da senha -->
            <div class="flex flex-col items-center">
                <span class="text-2xl font-bold uppercase tracking-[0.5em] text-blue-200 mb-2">Dirija-se ao:</span>
                <div id="current-guiche" class="text-8xl font-black bg-white text-senai px-16 py-4 rounded-3xl shadow-inner">---</div>
            </div>
        </div>

        <!-- Lado Direito: Histórico -->
        <div class="col-span-4 flex flex-col gap-6">
            <div class="bg-white rounded-[2rem] p-8 shadow-lg flex-grow border-t-8 border-senai overflow-hidden">
                <h3 class="text-3xl font-black text-gray-400 mb-8 uppercase tracking-tighter flex items-center gap-3">
                    <i data-lucide="history" class="w-8 h-8"></i> Últimas Chamadas
                </h3>
                <div id="history-list" class="space-y-6">
                    <!-- As senhas anteriores aparecerão aqui -->
                </div>
            </div>
        </div>
    </main>

    <!-- Nosso JavaScript Customizado -->
    <script src="/static/js/painel.js"></script>
</body>
</html>
