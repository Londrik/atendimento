<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAI - Totem de Atendimento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/totem.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans">

    <!-- Cartão Único do Totem -->
    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-lg text-center border border-gray-100">
        
        <!-- Cabeçalho (Sempre visível) -->
        <div id="header-totem" class="mb-10">
            <h1 class="text-4 shadow-sm text-[#005DA5] font-black text-5xl italic tracking-tighter">
                SENAI <span class="text-gray-400 font-light not-italic text-3xl">GAMA</span>
            </h1>
            <div class="h-1 w-20 bg-red-600 mx-auto mt-2 rounded-full"></div>
        </div>

        <!-- TELA 1: Seleção de Serviços -->
        <div id="grid-servicos" class="flex flex-col gap-5">
            <p class="text-gray-500 mb-2 font-medium text-lg">Selecione o serviço desejado:</p>
            
            <button onclick="gerarSenha('Geral')" 
                class="w-full py-8 bg-[#005DA5] hover:bg-[#004a85] text-white text-2xl font-bold rounded-2xl transition-all transform active:scale-95 shadow-lg">
                ATENDIMENTO GERAL
            </button>

            <button onclick="gerarSenha('Matrícula')" 
                class="w-full py-8 bg-[#005DA5] hover:bg-[#004a85] text-white text-2xl font-bold rounded-2xl transition-all transform active:scale-95 shadow-lg border-b-4 border-black/20">
                MATRÍCULA / FINANCEIRO
            </button>

            <button onclick="gerarSenha('Preferencial')" 
                class="w-full py-8 bg-gray-200 hover:bg-gray-300 text-[#005DA5] text-2xl font-bold rounded-2xl transition-all transform active:scale-95 border-b-4 border-gray-400/50">
                PREFERENCIAL
            </button>
        </div>

        <!-- TELA 2: Feedback de Sucesso (Inicia escondida com 'hidden') -->
        <div id="feedback-sucesso" class="hidden animate-fade-in">
            <div class="bg-green-50 border-2 border-green-200 rounded-3xl p-8 mb-6">
                <h2 class="text-green-700 font-bold text-xl mb-2">SENHA GERADA COM SUCESSO!</h2>
                <p class="text-gray-600 text-sm uppercase tracking-widest mb-4" id="info-servico"></p>
                
                <div class="bg-white border-4 border-[#005DA5] inline-block px-10 py-6 rounded-2xl shadow-inner">
                    <span id="display-senha" class="text-[#005DA5] text-7xl font-black tracking-widest">---</span>
                </div>
            </div>
            <p class="text-gray-500 font-medium italic">Aguarde ser chamado no painel...</p>
        </div>

        <!-- Rodapé (Sempre visível) -->
        <p class="text-gray-400 mt-10 text-sm font-semibold uppercase tracking-widest">
            Unidade de Tecnologia da Informação
        </p>
    </div>

    <!-- Script Único -->
    <script src="/static/js/totem.js"></script>
</body>
</html>
