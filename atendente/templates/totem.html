<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAI - Totem de Atendimento</title>
    <!-- Tailwind CSS para os botões e grid funcionarem -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Cabeçalho Oficial SENAI -->
    <nav class="bg-[#005DA5] p-6 text-white shadow-lg mb-10">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter italic">SENAI <span class="font-light not-italic text-lg ml-2">Unidade Gama</span></h1>
            <span class="bg-green-500 px-3 py-1 rounded-full text-xs animate-pulse">SISTEMA ONLINE</span>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto text-center px-4">
        <h2 class="text-4xl font-black text-gray-800 mb-4 uppercase">Emissão de Senha</h2>
        <p class="text-gray-600 mb-10">Selecione o tipo de atendimento desejado abaixo:</p>

        <!-- Grid de Botões -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 p-6">
            <button onclick="gerarSenha('Preferencial')" class="bg-red-600 text-white p-12 rounded-3xl text-3xl font-black shadow-2xl hover:scale-105 active:scale-95 transition-all uppercase">
                Preferencial
            </button>
            
            <button onclick="gerarSenha('Matrícula')" class="bg-green-600 text-white p-12 rounded-3xl text-3xl font-black shadow-2xl hover:scale-105 active:scale-95 transition-all uppercase">
                Matrículas
            </button>

            <button onclick="gerarSenha('Geral')" class="bg-blue-600 text-white p-12 rounded-3xl text-3xl font-black shadow-2xl hover:scale-105 active:scale-95 transition-all uppercase">
                Geral
            </button>
        </div>
    </div>

    <script>
    async function gerarSenha(tipo) {
        const nome = prompt("Digite seu nome para a senha:");
        if (!nome) return; 

        try {
            const response = await fetch('/gerar-senha', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    nome: nome, 
                    tipo: tipo 
                })
            });
            
            if (response.ok) {
                const data = await response.json();
                // Alerta estilizado (pode ser trocado por um modal depois)
                alert(`✅ SENHA GERADA COM SUCESSO!\n\nNOME: ${nome}\nSENHA: ${data.codigo}\nTIPO: ${tipo}\n\nAguarde ser chamado no painel.`);
            } else {
                alert("❌ Erro ao gerar senha. Verifique se o banco de dados está ligado.");
            }
        } catch (error) {
            console.error("Erro na requisição:", error);
            alert("⚠️ Erro de conexão com o servidor.");
        }
    }
    </script>
</body>
</html>
