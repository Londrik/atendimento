<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totem de Senhas - SENAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --senai-blue: #005ca9; }
        .bg-senai { background-color: var(--senai-blue); }
        .text-senai { color: var(--senai-blue); }
        .border-senai { border-color: var(--senai-blue); }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-sans overflow-hidden select-none">

    <header class="bg-white border-b-8 border-senai p-6 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-senai text-6xl font-black italic tracking-tighter">SENAI</h1>
                <p class="text-gray-500 font-bold tracking-widest uppercase ml-1">Serviço de Atendimento</p>
            </div>
            <div class="text-right">
                <span id="clock" class="text-2xl font-mono font-bold text-gray-600">00:00:00</span>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 flex flex-col items-center">
        <div class="w-full max-w-3xl mb-10">
            <label for="client-name" class="block text-2xl font-bold text-gray-700 mb-3 text-center">Digite seu nome:</label>
            <input type="text" id="client-name" class="w-full p-6 text-3xl text-center rounded-2xl border-4 border-gray-300 focus:border-senai outline-none shadow-inner uppercase font-semibold transition-all" placeholder="NOME COMPLETO">
        </div>

        <div class="grid grid-cols-2 gap-8 w-full max-w-5xl">
            <button onclick="gerarSenha('CONVENCIONAL')" class="btn-active bg-white border-2 border-gray-200 hover:border-senai p-10 rounded-3xl shadow-xl flex flex-col items-center group transition-all">
                <i data-lucide="user" class="w-20 h-20 text-senai mb-4"></i>
                <span class="text-2xl font-black text-gray-800 uppercase">Convencional</span>
            </button>

            <button onclick="gerarSenha('PRIORITARIO')" class="btn-active bg-white border-2 border-gray-200 hover:border-red-500 p-10 rounded-3xl shadow-xl flex flex-col items-center group transition-all">
                <i data-lucide="star" class="w-20 h-20 text-red-500 mb-4"></i>
                <span class="text-2xl font-black text-gray-800 uppercase">Prioritário</span>
            </button>

            <button onclick="gerarSenha('MATRICULA')" class="btn-active bg-white border-2 border-gray-200 hover:border-senai p-10 rounded-3xl shadow-xl flex flex-col items-center group transition-all">
                <i data-lucide="graduation-cap" class="w-20 h-20 text-senai mb-4"></i>
                <span class="text-2xl font-black text-gray-800 uppercase">Matrícula</span>
            </button>

            <button onclick="gerarSenha('INFORMACAO')" class="btn-active bg-white border-2 border-gray-200 hover:border-senai p-10 rounded-3xl shadow-xl flex flex-col items-center group transition-all">
                <i data-lucide="info" class="w-20 h-20 text-senai mb-4"></i>
                <span class="text-2xl font-black text-gray-800 uppercase">Informação</span>
            </button>
        </div>
    </main>

    <!-- Modal de Sucesso -->
    <div id="modal-sucesso" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-12 max-w-lg w-full text-center shadow-2xl">
            <div id="modal-icon" class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="check-circle-2" class="w-16 h-16"></i>
            </div>
            <h2 id="modal-title" class="text-3xl font-black text-gray-800 mb-2 uppercase">Senha Gerada!</h2>
            <div class="bg-gray-100 p-6 rounded-2xl mb-8">
                <span id="ticket-number" class="text-7xl font-mono font-black text-senai">---</span>
                <p id="ticket-type" class="text-gray-500 mt-2 font-bold uppercase"></p>
            </div>
            <p id="welcome-msg" class="text-gray-600 mb-6 font-medium font-bold"></p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('pt-BR');
        }
        setInterval(updateClock, 1000);

        async function gerarSenha(tipo) {
            const nomeInput = document.getElementById('client-name');
            const nome = nomeInput.value.trim();

            if (!nome) {
                alert("Por favor, digite seu nome.");
                return;
            }

            try {
                // Chamada real ao FastAPI
                const response = await fetch('http://127.0.0.1:8000/gerar-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome: nome, tipo: tipo })
                });

                if (!response.ok) throw new Error('Erro no servidor');

                const data = await response.json();
                exibirSucesso(data.codigo, data.tipo, data.nome);

            } catch (error) {
                alert("Erro ao conectar com o servidor. Verifique se o FastAPI está rodando.");
                console.error(error);
            }
        }

        function exibirSucesso(numero, tipo, nome) {
            const modal = document.getElementById('modal-sucesso');
            document.getElementById('ticket-number').textContent = numero;
            document.getElementById('ticket-type').textContent = tipo;
            document.getElementById('welcome-msg').textContent = `Olá, ${nome}! Aguarde ser chamado.`;
            
            modal.classList.remove('hidden');

            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('client-name').value = '';
            }, 5000);
        }
    </script>
</body>
</html>
